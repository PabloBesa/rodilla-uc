<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de Conocimientos — Rodilla UC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1a2744; --navy-mid:#243560; --gold:#c8973a; --gold-light:#e8c47a;
    --gold-pale:#f5e9cc; --cream:#faf8f3; --warm-gray:#f0ece3; --text:#2c2c2c;
    --text-muted:#5a5a5a; --border:#d4c9b0; --green:#2a6041; --green-light:#e8f2ec;
    --red-accent:#8b2e2e; --red-light:#f5eaea;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Source Serif 4',Georgia,serif; background:var(--cream); color:var(--text); font-size:15px; line-height:1.75; }
  .page { max-width:480px; margin:0 auto; background:white; min-height:100vh; }

  .header { background:var(--navy); padding:30px 24px 22px; position:relative; overflow:hidden; }
  .header::after { content:''; position:absolute; bottom:0; right:0; width:160px; height:100%;
    background:linear-gradient(135deg,transparent 50%,rgba(200,151,58,0.12) 100%); pointer-events:none; }
  .header-tag { font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
  .header h1 { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:white; line-height:1.2; }
  .header h1 span { color:var(--gold-light); }
  .header-sub { font-size:12px; color:rgba(255,255,255,0.6); font-style:italic; margin-top:4px; }
  .gold-rule { width:48px; height:3px; background:var(--gold); margin:14px 0 0; }

  /* BLOCK NAV */
  .nav-bar { background:var(--navy-mid); padding:10px 16px; display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;
    -webkit-overflow-scrolling:touch; position:sticky; top:0; z-index:20; }
  .nav-bar::-webkit-scrollbar { display:none; }
  .nav-pill { background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.8); border:none; border-radius:20px;
    padding:5px 12px; font-family:'Source Serif 4',serif; font-size:11px; white-space:nowrap; cursor:pointer; transition:background .2s; }
  .nav-pill.active { background:var(--gold); color:var(--navy); font-weight:600; }

  .content { padding:22px 20px 60px; }

  /* YEAR SELECTOR */
  .yearsel-wrap { margin-bottom:24px; }
  .yearsel-q { font-family:'Playfair Display',serif; font-size:14px; color:var(--navy); margin-bottom:10px; }
  .yearsel { display:flex; gap:8px; }
  .yr-big { flex:1; background:white; border:1.5px solid var(--border); color:var(--navy); border-radius:10px;
    padding:12px 0; font-family:'Playfair Display',serif; font-size:18px; font-weight:700; cursor:pointer; transition:all .18s; text-align:center; }
  .yr-big span { display:block; font-family:'Source Serif 4',serif; font-size:9.5px; font-weight:400; font-style:italic; color:var(--text-muted); margin-top:2px; letter-spacing:.3px; }
  .yr-big:hover { border-color:var(--gold); }
  .yr-big.active { background:var(--navy); color:white; border-color:var(--navy); }
  .yr-big.active span { color:var(--gold-light); }

  /* SECTION HEADER */
  .section-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; padding-bottom:8px; border-bottom:1.5px solid var(--border); }
  .section-num { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:var(--gold); opacity:.7; flex-shrink:0; }
  .section-title { font-family:'Playfair Display',serif; font-size:16px; font-weight:600; color:var(--navy); }
  .section-title em { display:block; font-family:'Source Serif 4',serif; font-size:10.5px; font-weight:400; font-style:italic; color:var(--text-muted); margin-top:1px; }

  /* BUCKETS */
  .bucket { margin-bottom:24px; }
  .bucket-title { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
  .bucket-title h2 { font-family:'Playfair Display',serif; font-size:15px; font-weight:600; color:var(--navy); }
  .bucket-title .count { font-size:10px; font-weight:600; color:var(--gold); background:var(--gold-pale); border-radius:20px; padding:2px 8px; }
  .bucket-sub { font-size:11px; font-style:italic; color:var(--text-muted); margin-bottom:13px; }
  .bucket-urgent .bucket-title h2 { color:var(--red-accent); }

  /* RESIDENT CARD */
  .rcard { background:var(--cream); border:1px solid var(--border); border-radius:9px; padding:13px 15px; margin-bottom:10px; }
  .rcard.urgent { background:var(--red-light); border-color:#e0bcbc; }
  .rcard-top { display:flex; align-items:flex-start; gap:9px; }
  .rcard-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); flex-shrink:0; margin-top:6px; }
  .rcard.urgent .rcard-dot { background:var(--red-accent); }
  .rcard-main { flex:1; min-width:0; }
  .rcard-title { font-family:'Playfair Display',serif; font-size:13.5px; font-weight:600; color:var(--navy); line-height:1.25; margin-bottom:5px; }
  .rcard-obj { font-size:12.5px; color:var(--text); line-height:1.6; }
  .rcard.urgent .rcard-obj { color:#4a1f1f; }
  .rcard-obj b { color:var(--red-accent); }
  .rcard-toggle { font-size:10.5px; color:var(--gold); font-weight:600; cursor:pointer; margin-top:9px; display:inline-block; letter-spacing:.2px; }
  .rcard-toggle:hover { text-decoration:underline; }
  .rdetail { display:none; margin-top:11px; padding-top:11px; border-top:1px dashed var(--border); }
  .rcard.open .rdetail { display:block; }
  .rcard.open .rcard-toggle .more { display:none; }
  .rcard-toggle .less { display:none; }
  .rcard.open .rcard-toggle .less { display:inline; }

  .axis { margin-bottom:11px; }
  .axis:last-child { margin-bottom:0; }
  .axis-label { font-size:9px; font-weight:600; letter-spacing:1.1px; text-transform:uppercase; color:var(--gold); margin-bottom:5px; }
  .dom-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:4px 0; border-bottom:1px dotted var(--border); }
  .dom-row:last-child { border-bottom:none; }
  .dom-name { font-size:11.5px; color:var(--text); line-height:1.4; }

  .chip { display:inline-block; min-width:30px; text-align:center; font-family:'Playfair Display',serif; font-size:11px; font-weight:700;
    padding:3px 9px; border-radius:20px; letter-spacing:.3px; border:1.5px solid transparent; }
  .chip.r1 { background:var(--green-light); color:var(--green); }
  .chip.r2 { background:var(--gold-pale); color:#8a6420; }
  .chip.r3 { background:var(--navy); color:var(--gold-light); }
  .chip.na { background:var(--warm-gray); color:#9a917f; font-style:italic; font-family:'Source Serif 4',serif; font-weight:400; }

  /* FUTURE GRID */
  .rdetail .dom-row.future { display:none; }
  .rdetail .axis.future-only { display:none; }
  .rdetail.show-future .dom-row.future { display:flex; }
  .rdetail.show-future .axis.future-only { display:block; }
  .rdetail .dom-row.future .chip { background:var(--warm-gray); color:#9a917f; box-shadow:none; opacity:.85; }
  .rdetail .dom-row.future .dom-name { color:#9a917f; }
  .future-toggle { font-size:10.5px; color:var(--text-muted); font-weight:600; cursor:pointer; margin-top:11px;
    display:inline-block; border-top:1px dotted var(--border); padding-top:9px; letter-spacing:.2px; }
  .future-toggle:hover { color:var(--navy); }
  .future-toggle .fl { display:none; }
  .rdetail.show-future .future-toggle .fm { display:none; }
  .rdetail.show-future .future-toggle .fl { display:inline; }
  .detail-note { font-size:10.5px; font-style:italic; color:var(--text-muted); margin-top:11px; padding:8px 11px; background:var(--warm-gray); border-radius:6px; line-height:1.5; }

  /* LECTURAS */
  .lect-toggle { font-size:10.5px; color:var(--green); font-weight:600; cursor:pointer; margin-top:9px; display:inline-block; letter-spacing:.2px; }
  .lect-toggle:hover { text-decoration:underline; }
  .lect-block { display:none; margin-top:10px; padding-top:11px; border-top:1px dashed var(--border); }
  .rcard.show-lect .lect-block { display:block; }
  .rcard.show-lect .lect-toggle .lmore { display:none; }
  .lect-toggle .lless { display:none; }
  .rcard.show-lect .lect-toggle .lless { display:inline; }
  .lect-item { display:flex; gap:9px; align-items:flex-start; padding:7px 0; border-bottom:1px dotted var(--border); }
  .lect-item:last-child { border-bottom:none; }
  .lect-item.lect-future { opacity:.4; }
  .lect-chip { flex-shrink:0; margin-top:1px; }
  .lect-tipo { font-size:8.5px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:2px; }
  .lect-cite { font-size:11.5px; color:var(--text); line-height:1.5; }
  .lect-cite a { color:var(--navy); text-decoration:underline; }

  /* MANTÉN (collapsed, red prominent) */
  .manten { border:1px solid #e0bcbc; border-radius:9px; overflow:hidden; }
  .manten-head { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:var(--red-light); cursor:pointer; border-left:4px solid var(--red-accent); }
  .manten-head .mh-title { font-family:'Playfair Display',serif; font-size:13px; font-weight:600; color:var(--red-accent); flex:1; }
  .manten-head .count { font-size:10px; font-weight:600; color:var(--red-accent); background:#f0d6d6; border-radius:20px; padding:2px 8px; margin-left:8px; }
  .manten-head .caret { font-size:11px; color:var(--red-accent); transition:transform .2s; margin-left:8px; }
  .manten.open .caret { transform:rotate(90deg); }
  .manten-body { display:none; padding:6px 14px 10px; }
  .manten.open .manten-body { display:block; }
  .manten-row { padding:9px 0; border-bottom:1px dotted var(--border); }
  .manten-row:last-child { border-bottom:none; }
  .manten-row .mr-t { font-family:'Playfair Display',serif; font-size:12px; font-weight:600; color:var(--navy); margin-bottom:2px; }
  .manten-row .mr-o { font-size:11.5px; color:var(--text-muted); line-height:1.5; }

  .empty { text-align:center; padding:34px 20px; color:var(--text-muted); font-style:italic; font-size:13px; }
  .footer { text-align:center; font-size:10.5px; color:var(--text-muted); font-style:italic; padding:22px 20px 36px; line-height:1.7; }
  .footer .gold-rule { margin:0 auto 12px; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-tag">Perfil de Conocimientos</div>
    <h1>Equipo de Rodilla <span>UC</span></h1>
    <div class="header-sub">Lo que se espera de ti, según tu año</div>
    <div class="gold-rule"></div>
  </div>

  <div class="nav-bar" id="navBar">
    <button class="nav-pill active" data-sec="generalidades">Generalidades</button>
    <button class="nav-pill" data-sec="trauma">Trauma</button>
    <button class="nav-pill" data-sec="ortopedia">Ortopedia</button>
    <button class="nav-pill" data-sec="reemplazo">Reemplazo</button>
    <button class="nav-pill" data-sec="miscelaneos">Misceláneos</button>
  </div>

  <div class="content">
    <div class="yearsel-wrap">
      <div class="yearsel-q">¿En qué año estás?</div>
      <div class="yearsel" id="yearSel">
        <button class="yr-big active" data-yr="1">R1<span>1.er año</span></button>
        <button class="yr-big" data-yr="2">R2<span>2.º año</span></button>
        <button class="yr-big" data-yr="3">R3<span>3.er año</span></button>
      </div>
    </div>
    <div id="resContent"></div>
  </div>

  <div class="footer">
    <div class="gold-rule"></div>
    Perfil de Conocimientos · Rotación Rodilla UC<br>Dr. Pablo Besa · Dr. Cristián Ruz
  </div>
</div>

             2:"Integras la anatomía de los compartimientos y de las esquinas (PM/PL) al razonamiento de la inestabilidad y a la planificación."},
        lecturas:[ {n:1, tipo:"Base", cita:"Miller's Review of Orthopaedics — anatomía y biomecánica de la rodilla.", url:""} ] },

        lecturas:[ {n:1, tipo:"Base", cita:"Hoppenfeld — exploración física de la rodilla.", url:""} ] },
      { t:"Estudio imagenológico de rodilla", tipo:"conocimiento", foco:1, dlv:[1,2,3],

      { t:"Artrocentesis y punción articular", tipo:"procedimiento", foco:1, dlv:[1,1,2],

      { t:"Principios de artroscopía de rodilla", tipo:"procedimiento", foco:2, dlv:[1,2,3],
        obj:{1:"Conoces los portales básicos, el equipamiento artroscópico y los principios de la artroscopía diagnóstica.",

        lecturas:[ {n:2, tipo:"Base", cita:"AO Principles of Fracture Management — conceptos avanzados.", url:""},

  function chipHTML(v){ return v===0 ? '<span class="chip na">—</span>' : '<span class="chip r'+v+'">R'+v+'</span>'; }
  function objForYear(tp,y){ if(tp.obj[y])return tp.obj[y]; for(let k=y-1;k>=1;k--) if(tp.obj[k])return tp.obj[k]; return null; }

  const FUTURE_TOGGLE = '<span class="future-toggle"><span class="fm">Lo que viene más adelante ›</span><span class="fl">Ocultar lo que viene ‹</span></span>';

  function detailHTML(tp,y){
    if(tp.tipo && TYPE_DIMS[tp.tipo]){
      const labels=TYPE_DIMS[tp.tipo]; let anyFuture=false;
      const rows=tp.dlv.map((lv,i)=>{
        const isNow=lv>0&&lv<=y; if(!isNow)anyFuture=true;
        return '<div class="dom-row '+(isNow?'now':'future')+'"><span class="dom-name">'+labels[i]+'</span>'+chipHTML(lv)+'</div>';
      }).join('');
      return '<div class="axis">'+rows+'</div>'+(anyFuture?FUTURE_TOGGLE:'');
    }
    let anyFuture=false;
    const axesHTML = AXES.map(ax=>{
      const rowsArr = ax.idx.map(di=>{
        const lv=tp.lv[di];
        if(lv===0 && tp.note) return null;
        const isNow = lv>0 && lv<=y;
        if(!isNow) anyFuture=true;
        return '<div class="dom-row '+(isNow?'now':'future')+'"><span class="dom-name">'+DOMAINS[di]+'</span>'+chipHTML(lv)+'</div>';
      }).filter(Boolean);
      if(!rowsArr.length) return '';
      const hasNow = ax.idx.some(di=>tp.lv[di]>0 && tp.lv[di]<=y);
      return '<div class="axis'+(hasNow?'':' future-only')+'"><div class="axis-label">'+ax.label+'</div>'+rowsArr.join('')+'</div>';
    }).join('');
    const noteHTML = tp.note ? '<div class="detail-note">'+tp.note+'</div>' : '';
    return axesHTML + noteHTML + (anyFuture ? FUTURE_TOGGLE : '');
  }

  function rcardHTML(tp,y){
    const u = tp.urgent ? ' urgent' : '';
    let lectHTML='';
    if(tp.lecturas && tp.lecturas.length){
      const items = tp.lecturas.map(L=>{
        const fut = L.n>y ? ' lect-future' : '';
        const cite = L.url ? '<a href="'+L.url+'" target="_blank" rel="noopener">'+L.cita+'</a>' : L.cita;
        return '<div class="lect-item'+fut+'"><span class="lect-chip">'+chipHTML(L.n)+'</span><span class="lect-body"><span class="lect-tipo">'+L.tipo+'</span><span class="lect-cite">'+cite+'</span></span></div>';
      }).join('');
      lectHTML = '<span class="lect-toggle"><span class="lmore">📖 Lecturas sugeridas ›</span><span class="lless">📖 Ocultar lecturas ‹</span></span><div class="lect-block">'+items+'</div>';
    }
    return '<div class="rcard'+u+'"><div class="rcard-top"><span class="rcard-dot"></span><div class="rcard-main">'+
      '<div class="rcard-title">'+tp.t+'</div><div class="rcard-obj">'+tp.obj[y]+'</div>'+
      '<span class="rcard-toggle"><span class="more">Ver detalle por dominio ›</span><span class="less">Ocultar detalle ‹</span></span>'+
      '<div class="rdetail">'+detailHTML(tp,y)+'</div>'+lectHTML+'</div></div></div>';
  }

  function renderResident(){
    const y=STATE.year, block=STATE.block;
    const topics = BLOCKS[block]||[]; const meta = BLOCK_META[block];
    const dominar=[],reconocer=[],manten=[];
    topics.forEach(tp=>{
      const has=!!tp.obj[y];
      if(tp.foco===y&&has)dominar.push(tp);
      else if(tp.foco>y){ if(has)reconocer.push(tp); }
      else { if(objForYear(tp,y))manten.push(tp); }
    });

    let html='<div class="section-header"><div class="section-num">'+meta.num+'</div><div class="section-title">'+meta.title+'<em>'+meta.sub+'</em></div></div>';

    if(dominar.length){
      html+='<div class="bucket"><div class="bucket-title"><h2>A dominar este año</h2><span class="count">'+dominar.length+'</span></div>'+
        '<div class="bucket-sub">Lo central de tu R'+y+': debes manejarlo con autonomía.</div>'+
        dominar.map(tp=>rcardHTML(tp,y)).join('')+'</div>';
    }
    if(reconocer.length){
      const anyUrgent=reconocer.some(t=>t.urgent);
      html+='<div class="bucket'+(anyUrgent?' bucket-urgent':'')+'"><div class="bucket-title"><h2>En tu radar este año</h2><span class="count">'+reconocer.length+'</span></div>'+
        reconocer.map(tp=>rcardHTML(tp,y)).join('')+'</div>';
    }
    if(manten.length){
      const rows=manten.map(tp=>'<div class="manten-row"><div class="mr-t">'+tp.t+'</div><div class="mr-o">'+objForYear(tp,y)+'</div></div>').join('');
      html+='<div class="bucket"><div class="manten"><div class="manten-head"><span class="mh-title">Ya lo manejas — mantén y profundiza</span><span class="count">'+manten.length+'</span><span class="caret">›</span></div>'+
        '<div class="manten-body">'+rows+'</div></div></div>';
    }
    if(!dominar.length&&!reconocer.length&&!manten.length){
      html+='<div class="empty">Sin contenidos definidos para R'+y+' en este módulo.</div>';
    }

    const host=document.getElementById('resContent');
    host.innerHTML=html;
    host.querySelectorAll('.rcard-toggle').forEach(t=>t.addEventListener('click',()=>t.closest('.rcard').classList.toggle('open')));
    host.querySelectorAll('.future-toggle').forEach(t=>t.addEventListener('click',e=>{e.stopPropagation();t.closest('.rdetail').classList.toggle('show-future');}));
    host.querySelectorAll('.lect-toggle').forEach(t=>t.addEventListener('click',e=>{e.stopPropagation();t.closest('.rcard').classList.toggle('show-lect');}));
    host.querySelectorAll('.manten-head').forEach(h=>h.addEventListener('click',()=>h.closest('.manten').classList.toggle('open')));
  }

  const STATE={ year:1, block:'generalidades' };

  document.getElementById('navBar').addEventListener('click',e=>{
    const b=e.target.closest('.nav-pill'); if(!b)return;
    document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active')); b.classList.add('active');
    STATE.block=b.dataset.sec; renderResident();
    document.querySelector('.content').scrollIntoView({behavior:'smooth',block:'start'});
  });
  document.getElementById('yearSel').addEventListener('click',e=>{
    const b=e.target.closest('.yr-big'); if(!b)return;
    document.querySelectorAll('.yr-big').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    STATE.year=parseInt(b.dataset.yr,10); renderResident();
  });

  renderResident();
</script>
</body>
</html>
